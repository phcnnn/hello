<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>情境式智慧導航系統</title>
  <meta name="description" content="結合安全、空氣品質、遮蔭等情境的智慧導航系統" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="glass-header">
    <h1>情境式智慧導航系統</h1>
  </header>

  <main class="container glass-panel">
    <section class="controls">
      <div class="input-group">
        <label for="start">起點：</label>
        <input type="text" id="start" placeholder="例如：台中火車站" value="台中火車站" />
      </div>
      <div class="input-group">
        <label for="end">終點：</label>
        <input type="text" id="end" placeholder="例如：台中一中" value="台中一中" />
      </div>
      <div class="input-group">
        <label for="scenario">情境模式 (F-02)：</label>
        <select id="scenario">
          <option value="time">時間優先 (預設)</option>
          <option value="safety">安全優先 (避開暗巷)</option>
          <option value="air">空氣品質優先 (AQI佳)</option>
          <option value="shade">遮蔭優先 (躲避日照)</option>
        </select>
      </div>
      <button id="searchBtn" class="primary-btn">搜尋並比較路線</button>
    </section>

    <section id="map" class="map"></section>

    <!-- F-03: 多條路線比較面板 -->
    <section class="info-panel" id="comparisonPanel">
      <h2 class="panel-title">路線比較分析 (F-03)</h2>
      <div id="routeCardsContainer" class="route-cards">
        <!-- 路線卡片會動態生成於此 -->
        <div class="empty-state">請輸入起終點以查看路線比較</div>
      </div>
    </section>
  </main>

  <footer class="glass-footer">
    <p>© 2026 情境式智慧導航系統</p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="script.js"></script>
</body>
</html>
